name: PR Checks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Bun Check
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      NO_COLOR: 1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: bun install

      - name: Run root checks
        run: bun run check

      - name: Build CLI
        run: bun run build

      - name: Smoke built CLI
        run: node dist/cli.js --help
