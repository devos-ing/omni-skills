name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.7.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release tag
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(bun -e "console.log(require('./packages/cli/package.json').version)")"

          if [[ "${tag_version}" != "${package_version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match packages/cli version ${package_version}."
            exit 1
          fi

      - name: Run CLI release gate
        run: |
          bun run --filter devos check
          bun run --filter devos typecheck
          bun run --filter devos test
          bun run --filter devos build
          cd packages/cli
          bun pm pack --dry-run --ignore-scripts

      - name: Pack CLI tarball
        run: |
          mkdir -p dist-release
          cd packages/cli
          bun pm pack --ignore-scripts
          mv "devos-${GITHUB_REF_NAME#v}.tgz" "../../dist-release/devos-${GITHUB_REF_NAME#v}.tgz"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "dist-release/devos-${GITHUB_REF_NAME#v}.tgz" \
            --title "devos ${GITHUB_REF_NAME}" \
            --notes "Release ${GITHUB_REF_NAME}" \
            --verify-tag
