name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write

jobs:
  build-release:
    name: Build and Release
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      NO_COLOR: 1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Set up npm registry
        uses: actions/setup-node@v4
        with:
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install

      - name: Run CI checks
        run: bun run ci:check

      - name: Build CLI
        run: bun run build

      - name: Pack release assets
        run: |
          mkdir -p release
          safe_tag="${GITHUB_REF_NAME//\//-}"
          cp dist/cli.js "release/getsuperpower-${safe_tag}.js"
          npm pack --ignore-scripts --pack-destination release
          ls -la release

      - name: Read npm package metadata
        id: package
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          dist_tag="$(node -p "const version = require('./package.json').version; const prerelease = version.includes('-') ? version.split('-')[1].split('.')[0] : ''; prerelease || 'latest'")"
          echo "name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "version=${package_version}" >> "$GITHUB_OUTPUT"
          echo "dist_tag=${dist_tag}" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is required to publish to npm." >&2
            exit 1
          fi

          package_ref="${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}"
          if npm view "$package_ref" version >/dev/null 2>&1; then
            echo "$package_ref already exists on npm; skipping publish."
            exit 0
          fi

          npm publish --ignore-scripts --provenance --access public --tag "${{ steps.package.outputs.dist_tag }}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" release/* --title "$GITHUB_REF_NAME" --generate-notes
          fi
