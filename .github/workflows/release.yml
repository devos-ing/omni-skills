name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.7.0
          registry-url: https://registry.npmjs.org
          always-auth: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release tag
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(bun -e "console.log(require('./packages/cli/package.json').version)")"

          if [[ "${tag_version}" != "${package_version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match packages/cli version ${package_version}."
            exit 1
          fi

      - name: Verify npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -z "${NPM_CONFIG_TOKEN}" ]]; then
            echo "NPM_TOKEN secret is required for release dry-run authentication."
            exit 1
          fi

      - name: Configure npm auth for Bun
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          {
            echo "registry=https://registry.npmjs.org/"
            echo "always-auth=true"
            echo "//registry.npmjs.org/:_authToken=${NPM_CONFIG_TOKEN}"
          } > "${HOME}/.npmrc"

      - name: Run CLI release gate
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          bun run release:cli

      - name: Pack CLI tarball
        run: |
          mkdir -p dist-release
          cd packages/cli
          bun pm pack --ignore-scripts
          mv "devos-${GITHUB_REF_NAME#v}.tgz" "../../dist-release/devos-${GITHUB_REF_NAME#v}.tgz"

      - name: Build release notes
        run: |
          notes_path="dist-release/release-notes.md"
          previous_tag="$(
            git tag --sort=-version:refname |
              grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
              grep -v "^${GITHUB_REF_NAME}$" |
              head -n 1 || true
          )"
          release_commit="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"

          if [[ -n "${previous_tag}" ]]; then
            release_range="${previous_tag}..${GITHUB_REF_NAME}"
            range_label="${previous_tag}...${GITHUB_REF_NAME}"
          else
            release_range="${GITHUB_REF_NAME}"
            range_label="${GITHUB_REF_NAME}"
          fi

          changelog="$(
            git log --first-parent --pretty=format:'- %s (%h)' "${release_range}" || true
          )"
          merge_commits="$(
            git log --merges --first-parent --pretty=format:'- %s (%h)' "${release_range}" || true
          )"

          {
            echo "## Changelog"
            echo
            echo "Range: ${range_label}"
            echo
            if [[ -n "${changelog}" ]]; then
              echo "${changelog}"
            else
              echo "_No commits found for this release range._"
            fi
            echo
            echo
            echo "## Merge Commits"
            echo
            if [[ -n "${merge_commits}" ]]; then
              echo "${merge_commits}"
            else
              echo "_No merge commits in this release range._"
            fi
            echo
            echo
            echo "## Release Commit"
            echo
            echo "- ${release_commit}"
          } > "${notes_path}"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset="dist-release/devos-${GITHUB_REF_NAME#v}.tgz"
          notes_path="dist-release/release-notes.md"

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "devos ${GITHUB_REF_NAME}" \
              --notes-file "${notes_path}"
            gh release upload "${GITHUB_REF_NAME}" "${asset}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              "${asset}" \
              --title "devos ${GITHUB_REF_NAME}" \
              --notes-file "${notes_path}" \
              --verify-tag
          fi
