name: show-me-ur-agents

x-app-env: &app-env
  BUN_INSTALL_CACHE_DIR: /bun-cache

x-app-base: &app-base
  image: oven/bun:1.3.8
  working_dir: /app
  env_file:
    - path: .env
      required: false
  volumes:
    - .:/app
    - node_modules:/app/node_modules
    - bun_cache:/bun-cache
    - devos_state:/app/.devos

services:
  deps:
    <<: *app-base
    environment:
      <<: *app-env
    command: bun install --frozen-lockfile

  server:
    <<: *app-base
    depends_on:
      deps:
        condition: service_completed_successfully
    environment:
      <<: *app-env
      PIV_SERVER_PORT: "3001"
    command: bun run --filter devos-server start
    ports:
      - "3001:3001"

  web:
    <<: *app-base
    depends_on:
      deps:
        condition: service_completed_successfully
      server:
        condition: service_started
    environment:
      <<: *app-env
      DEVOS_SERVER_BASE_URL: http://server:3001
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_DEVOS_SERVER_WS_URL: ws://localhost:3001/api/cli/stream
      PORT: "3000"
    command: bun run --filter web dev
    ports:
      - "3000:3000"

  landing:
    <<: *app-base
    depends_on:
      deps:
        condition: service_completed_successfully
    environment:
      <<: *app-env
      HOSTNAME: 0.0.0.0
      PORT: "3002"
    command: bun run --filter landing dev
    ports:
      - "3002:3002"

volumes:
  node_modules:
  bun_cache:
  devos_state:
