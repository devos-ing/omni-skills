openapi: 3.0.3
info:
  title: devos.ing Server API
  version: 0.1.0
  description: Implemented HTTP routes for the Express-backed server.
servers:
  - url: http://localhost:3001
tags:
  - name: Health
  - name: CLI
  - name: Read Models
  - name: Board
  - name: Notifications
  - name: Polling
paths:
  /health:
    get:
      tags: [Health]
      responses:
        '200':
          description: Server health.
  /api/cli/history:
    get:
      tags: [CLI]
      responses:
        '200':
          description: In-memory CLI execution history.
  /api/computers:
    get:
      tags: [CLI]
      responses:
        '200':
          description: Registered workflow worker computers.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RegisteredComputerRecord'
  /api/token-usage:
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Token usage rows.
  /api/jobs:
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Job rows.
  /api/projects:
    get:
      tags: [Board]
      responses:
        '200':
          description: Project rows.
    post:
      tags: [Board]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
      responses:
        '201':
          description: Created project.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/projects/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Board]
      responses:
        '200':
          description: Project row.
        '404':
          $ref: '#/components/responses/TypedError'
    patch:
      tags: [Board]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpdateRequest'
      responses:
        '200':
          description: Updated project.
        '400':
          $ref: '#/components/responses/TypedError'
        '404':
          $ref: '#/components/responses/TypedError'
    delete:
      tags: [Board]
      responses:
        '200':
          description: Deleted project.
        '404':
          $ref: '#/components/responses/TypedError'
  /api/tasks:
    get:
      tags: [Board]
      responses:
        '200':
          description: Task rows.
    post:
      tags: [Board]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreateRequest'
      responses:
        '201':
          description: Created task.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/tasks/chat-create:
    post:
      tags: [Board]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskChatCreateRequest'
      responses:
        '200':
          description: Structured chat task creation result.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/tasks/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Board]
      responses:
        '200':
          description: Task row.
        '404':
          $ref: '#/components/responses/TypedError'
    patch:
      tags: [Board]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdateRequest'
      responses:
        '200':
          description: Updated task.
        '400':
          $ref: '#/components/responses/TypedError'
        '404':
          $ref: '#/components/responses/TypedError'
    delete:
      tags: [Board]
      responses:
        '200':
          description: Deleted task.
        '404':
          $ref: '#/components/responses/TypedError'
  /api/tasks/{id}/activity:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Board]
      responses:
        '200':
          description: Task activity timeline.
        '404':
          $ref: '#/components/responses/TypedError'
  /api/agents:
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Agent rows.
    post:
      tags: [Read Models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentCreateRequest'
      responses:
        '201':
          description: Created agent.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/agents/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Agent row.
        '404':
          $ref: '#/components/responses/TypedError'
    patch:
      tags: [Read Models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentUpdateRequest'
      responses:
        '200':
          description: Updated agent.
        '400':
          $ref: '#/components/responses/TypedError'
        '404':
          $ref: '#/components/responses/TypedError'
    delete:
      tags: [Read Models]
      responses:
        '204':
          description: Deleted agent.
        '404':
          $ref: '#/components/responses/TypedError'
  /api/skills:
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Skill rows.
    post:
      tags: [Read Models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillCreateRequest'
      responses:
        '201':
          description: Created skill.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/skills/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Skill row.
        '404':
          $ref: '#/components/responses/TypedError'
    patch:
      tags: [Read Models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillUpdateRequest'
      responses:
        '200':
          description: Updated skill.
        '400':
          $ref: '#/components/responses/TypedError'
        '404':
          $ref: '#/components/responses/TypedError'
    delete:
      tags: [Read Models]
      responses:
        '204':
          description: Deleted skill.
        '404':
          $ref: '#/components/responses/TypedError'
  /api/command-history:
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Command history rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CommandHistoryRecord'
  /api/project-boards:
    get:
      tags: [Read Models]
      summary: Read project board records
      responses:
        '200':
          description: Project board rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectBoardRecord'
  /api/board-projects:
    get:
      tags: [Read Models]
      summary: Read board project records
      responses:
        '200':
          description: Board project rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BoardProjectRecord'
  /api/board-tasks:
    get:
      tags: [Read Models]
      summary: Read board task records
      responses:
        '200':
          description: Board task rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BoardTaskRecord'
  /api/polling/status:
    get:
      tags: [Polling]
      summary: Read polling health and recent operational events
      responses:
        '200':
          description: Poller status rows and recent event rows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PollingStatusResponse'
  /api/workspaces/{workspaceId}/projects:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
    get:
      tags: [Board]
      responses:
        '200':
          description: Workspace project list.
  /api/workspaces/{workspaceId}/projects/{projectId}/board:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Board]
      responses:
        '200':
          description: Workspace project board.
        '404':
          $ref: '#/components/responses/TypedError'
  /api/inbox/messages:
    get:
      tags: [Read Models]
      parameters:
        - in: query
          name: workspaceId
          required: true
          schema:
            type: string
            minLength: 1
        - in: query
          name: userId
          required: true
          schema:
            type: string
            minLength: 1
        - in: query
          name: runId
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Inbox messages scoped by workspace, user, and run.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InboxMessageRecord'
        '400':
          $ref: '#/components/responses/TypedError'
    post:
      tags: [Read Models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InboxMessageCreateRequest'
      responses:
        '201':
          description: Created inbox message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxMessageRecord'
        '400':
          $ref: '#/components/responses/TypedError'
  /api/notifications:
    post:
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '202':
          description: Notification accepted.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/notifications/email:
    post:
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Notification sent.
        '400':
          $ref: '#/components/responses/TypedError'
components:
  parameters:
    Id:
      in: path
      name: id
      required: true
      schema:
        type: string
        minLength: 1
    WorkspaceId:
      in: path
      name: workspaceId
      required: true
      schema:
        type: string
        minLength: 1
    ProjectId:
      in: path
      name: projectId
      required: true
      schema:
        type: string
        minLength: 1
  responses:
    TypedError:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TypedError'
  schemas:
    TypedError:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: string
    AgentCreateRequest:
      type: object
      additionalProperties: false
      required: [id, name, backend, model, createdAt]
      properties:
        id: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        backend: { type: string, minLength: 1 }
        model: { type: string, minLength: 1 }
        createdAt: { type: string, minLength: 1 }
    AgentUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/AgentPatchFields'
        - minProperties: 1
    AgentPatchFields:
      type: object
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1 }
        backend: { type: string, minLength: 1 }
        model: { type: string, minLength: 1 }
        createdAt: { type: string, minLength: 1 }
    SkillCreateRequest:
      type: object
      additionalProperties: false
      required: [id, name, description, source, updatedAt]
      properties:
        id: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        description: { type: string, minLength: 1 }
        source: { type: string, minLength: 1 }
        updatedAt: { type: string, minLength: 1 }
    SkillUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/SkillPatchFields'
        - minProperties: 1
    SkillPatchFields:
      type: object
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string, minLength: 1 }
        source: { type: string, minLength: 1 }
        updatedAt: { type: string, minLength: 1 }
    ProjectCreateRequest:
      type: object
      additionalProperties: false
      required: [boardId, name, ownerId]
      properties:
        boardId: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        ownerId: { type: string, minLength: 1 }
        externalProjectId:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
    ProjectUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/ProjectPatchFields'
        - minProperties: 1
    ProjectPatchFields:
      type: object
      additionalProperties: false
      properties:
        boardId: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        ownerId: { type: string, minLength: 1 }
        externalProjectId:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
    TaskCreateRequest:
      type: object
      additionalProperties: false
      required: [title, priority, status, creatorId]
      properties:
        projectId:
          type: string
          minLength: 1
          nullable: true
        title: { type: string, minLength: 1 }
        content: { type: string }
        priority: { type: integer }
        status: { type: string, minLength: 1 }
        creatorId: { type: string, minLength: 1 }
        assigneeId:
          type: string
          nullable: true
        dueDate:
          type: string
          nullable: true
        linkedPr:
          type: string
          nullable: true
    TaskChatCreateRequest:
      type: object
      additionalProperties: false
      required: [request]
      properties:
        request: { type: string, minLength: 1 }
        projectId: { type: string, minLength: 1 }
        answers:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [question, answer]
            properties:
              question: { type: string, minLength: 1 }
              answer: { type: string, minLength: 1 }
    TaskUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/TaskPatchFields'
        - minProperties: 1
    InboxMessageCreateRequest:
      type: object
      additionalProperties: false
      required: [workspaceId, userId, runId, source, kind, body]
      properties:
        workspaceId: { type: string, minLength: 1 }
        userId: { type: string, minLength: 1 }
        runId: { type: string, minLength: 1 }
        source: { type: string, minLength: 1 }
        kind: { type: string, minLength: 1 }
        body: { type: string, minLength: 1 }
        taskId:
          type: string
          nullable: true
        agentId:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        createdAt:
          type: string
    InboxMessageRecord:
      type: object
      additionalProperties: false
      required:
        [id, workspaceId, userId, runId, source, kind, body, taskId, agentId, metadata, createdAt]
      properties:
        id: { type: string, minLength: 1 }
        workspaceId: { type: string, minLength: 1 }
        userId: { type: string, minLength: 1 }
        runId: { type: string, minLength: 1 }
        source: { type: string, minLength: 1 }
        kind: { type: string, minLength: 1 }
        body: { type: string, minLength: 1 }
        taskId:
          type: string
          nullable: true
        agentId:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        createdAt:
          type: string
    TaskPatchFields:
      type: object
      additionalProperties: false
      properties:
        projectId: { type: string, minLength: 1 }
        title: { type: string, minLength: 1 }
        content: { type: string }
        priority: { type: integer }
        status: { type: string, minLength: 1 }
        creatorId: { type: string, minLength: 1 }
        assigneeId:
          type: string
          nullable: true
        dueDate:
          type: string
          nullable: true
        linkedPr:
          type: string
          nullable: true
        linearIssueId:
          type: string
          nullable: true
        linearIdentifier:
          type: string
          nullable: true
        linearUrl:
          type: string
          nullable: true
    ProjectBoardRecord:
      type: object
      additionalProperties: false
      required: [id, name, ownerId, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        ownerId:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
    BoardProjectRecord:
      type: object
      additionalProperties: false
      required: [id, boardId, name, ownerId, createdAt, updatedAt]
      properties:
        id:
          type: string
        boardId:
          type: string
        externalProjectId:
          type: string
          nullable: true
        name:
          type: string
        description:
          type: string
          nullable: true
        ownerId:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
    BoardTaskRecord:
      type: object
      additionalProperties: false
      required: [id, title, content, priority, status, creatorId, createdAt, updatedAt]
      properties:
        id:
          type: string
        projectId:
          type: string
          nullable: true
        title:
          type: string
        content:
          type: string
        priority:
          type: integer
        status:
          type: string
        dueDate:
          type: string
          nullable: true
        creatorId:
          type: string
        linkedPr:
          type: string
          nullable: true
        linearIssueId:
          type: string
          nullable: true
        linearIdentifier:
          type: string
          nullable: true
        linearUrl:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
    CommandHistoryRecord:
      type: object
      additionalProperties: false
      required: [id, command, exitCode, executedAt]
      properties:
        id:
          type: string
        command:
          type: string
        exitCode:
          type: integer
        executedAt:
          type: string
    RegisteredComputerRecord:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - hostname
        - platform
        - arch
        - cwd
        - startedAt
        - workerId
        - status
        - connectedAt
        - lastSeenAt
      properties:
        id:
          type: string
        name:
          type: string
        hostname:
          type: string
        platform:
          type: string
        arch:
          type: string
        cwd:
          type: string
        startedAt:
          type: string
        processId:
          type: integer
        user:
          type: string
        workerId:
          type: string
        status:
          type: string
          enum: [online, offline]
        connectedAt:
          type: string
        lastSeenAt:
          type: string
        disconnectedAt:
          type: string
    PollingStatusResponse:
      type: object
      additionalProperties: false
      required: [pollers, events]
      properties:
        pollers:
          type: array
          items:
            $ref: '#/components/schemas/PollingStatusRecord'
        events:
          type: array
          items:
            $ref: '#/components/schemas/PollingEventRecord'
    PollingStatusRecord:
      type: object
      additionalProperties: false
      required:
        [id, sourceType, sourceId, projectId, state, intervalMs, lastStartedAt, lastFinishedAt, lastSuccessAt, lastErrorAt, lastIssueCount, lastStaleRetryCount, lastReadyTaskCount, lastDispatchCount, consecutiveFailures, lastError, updatedAt]
      properties:
        id: { type: string }
        sourceType: { type: string }
        sourceId: { type: string }
        projectId:
          type: string
          nullable: true
        state: { type: string }
        intervalMs: { type: integer }
        lastStartedAt:
          type: string
          nullable: true
        lastFinishedAt:
          type: string
          nullable: true
        lastSuccessAt:
          type: string
          nullable: true
        lastErrorAt:
          type: string
          nullable: true
        lastIssueCount: { type: integer }
        lastStaleRetryCount: { type: integer }
        lastReadyTaskCount: { type: integer }
        lastDispatchCount: { type: integer }
        consecutiveFailures: { type: integer }
        lastError:
          type: string
          nullable: true
        updatedAt: { type: string }
    PollingEventRecord:
      type: object
      additionalProperties: false
      required:
        [id, pollerId, sourceType, sourceId, projectId, level, eventType, message, metadata, createdAt]
      properties:
        id: { type: string }
        pollerId: { type: string }
        sourceType: { type: string }
        sourceId: { type: string }
        projectId:
          type: string
          nullable: true
        level: { type: string }
        eventType: { type: string }
        message: { type: string }
        metadata:
          type: object
          additionalProperties: true
        createdAt: { type: string }
