openapi: 3.0.3
info:
  title: devos.ing Server API
  version: 0.1.0
  description: Implemented HTTP routes for the Express-backed server.
servers:
  - url: http://localhost:3001
tags:
  - name: Health
  - name: CLI
  - name: GitHub
  - name: Read Models
  - name: Board
  - name: Chat
  - name: Notifications
  - name: Polling
  - name: Workspace
paths:
  /health:
    get:
      tags: [Health]
      responses:
        '200':
          description: Server health.
  /api/cli/history:
    get:
      tags: [CLI]
      responses:
        '200':
          description: In-memory CLI execution history.
  /api/github/repositories/search:
    get:
      tags: [GitHub]
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: GitHub repository search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubRepositorySearchResponse'
        '400':
          $ref: '#/components/responses/TypedError'
        '429':
          $ref: '#/components/responses/TypedError'
        '502':
          $ref: '#/components/responses/TypedError'
        '503':
          $ref: '#/components/responses/TypedError'
  /api/computers:
    get:
      tags: [CLI]
      responses:
        '200':
          description: Registered workflow worker computers.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RegisteredComputerRecord'
  /api/token-usage:
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Token usage rows.
  /api/jobs:
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Job rows.
  /api/projects:
    get:
      tags: [Board]
      responses:
        '200':
          description: Project rows.
    post:
      tags: [Board]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
      responses:
        '201':
          description: Created project.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/projects/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Board]
      responses:
        '200':
          description: Project row.
        '404':
          $ref: '#/components/responses/TypedError'
    patch:
      tags: [Board]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpdateRequest'
      responses:
        '200':
          description: Updated project.
        '400':
          $ref: '#/components/responses/TypedError'
        '404':
          $ref: '#/components/responses/TypedError'
    delete:
      tags: [Board]
      responses:
        '200':
          description: Deleted project.
        '404':
          $ref: '#/components/responses/TypedError'
  /api/github/connection:
    get:
      tags: [GitHub]
      responses:
        '200':
          description: GitHub OAuth connection state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubConnectionResponse'
    delete:
      tags: [GitHub]
      responses:
        '200':
          description: Cleared local GitHub OAuth connection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubConnectionResponse'
  /api/github/oauth/start:
    get:
      tags: [GitHub]
      parameters:
        - in: query
          name: returnTo
          required: false
          schema:
            type: string
            minLength: 1
        - in: query
          name: origin
          required: false
          schema:
            type: string
            minLength: 1
      responses:
        '302':
          description: Redirects to GitHub OAuth authorization.
        '503':
          description: GitHub OAuth is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubConnectionResponse'
  /api/github/oauth/callback:
    get:
      tags: [GitHub]
      parameters:
        - in: query
          name: code
          required: false
          schema:
            type: string
            minLength: 1
        - in: query
          name: state
          required: false
          schema:
            type: string
            minLength: 1
      responses:
        '302':
          description: Redirects to Projects after the OAuth callback.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/github/device/start:
    post:
      tags: [GitHub]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GitHubDeviceStartRequest'
      responses:
        '200':
          description: GitHub device flow code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubDeviceStartResponse'
        '400':
          $ref: '#/components/responses/TypedError'
  /api/github/device/poll:
    post:
      tags: [GitHub]
      responses:
        '200':
          description: GitHub device authorization status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubDevicePollResponse'
        '400':
          $ref: '#/components/responses/TypedError'
  /api/github/repositories:
    get:
      tags: [GitHub]
      responses:
        '200':
          description: GitHub repositories available to the connected account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubRepositoriesResponse'
  /api/workspace/current:
    get:
      tags: [Workspace]
      responses:
        '200':
          description: Current configured workspace identity.
  /api/chat/sessions:
    get:
      tags: [Chat]
      parameters:
        - in: query
          name: workspaceId
          required: false
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Chat sessions for the workspace.
    post:
      tags: [Chat]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatSessionCreateRequest'
      responses:
        '201':
          description: Created chat session.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/chat/sessions/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    patch:
      tags: [Chat]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatSessionUpdateRequest'
      responses:
        '200':
          description: Updated chat session.
        '400':
          $ref: '#/components/responses/TypedError'
        '404':
          $ref: '#/components/responses/TypedError'
    delete:
      tags: [Chat]
      responses:
        '200':
          description: Archived chat session.
        '404':
          $ref: '#/components/responses/TypedError'
  /api/chat/sessions/{id}/status:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Chat]
      responses:
        '200':
          description: Current chat session runtime and workflow status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSessionStatusResponse'
        '404':
          $ref: '#/components/responses/TypedError'
  /api/chat/sessions/{id}/messages:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Chat]
      responses:
        '200':
          description: Chat session messages.
        '404':
          $ref: '#/components/responses/TypedError'
    post:
      tags: [Chat]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatMessageCreateRequest'
      responses:
        '201':
          description: Appended chat message.
        '400':
          $ref: '#/components/responses/TypedError'
        '404':
          $ref: '#/components/responses/TypedError'
  /api/chat/sessions/{id}/send:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Chat]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatSendMessageRequest'
      responses:
        '200':
          description: Chat send result.
        '400':
          $ref: '#/components/responses/TypedError'
        '404':
          $ref: '#/components/responses/TypedError'
  /api/tasks:
    get:
      tags: [Board]
      responses:
        '200':
          description: Task rows.
    post:
      tags: [Board]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreateRequest'
      responses:
        '201':
          description: Created task.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/tasks/chat-create:
    post:
      tags: [Board]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskChatCreateRequest'
      responses:
        '200':
          description: Structured chat task creation result.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/tasks/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Board]
      responses:
        '200':
          description: Task row.
        '404':
          $ref: '#/components/responses/TypedError'
    patch:
      tags: [Board]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdateRequest'
      responses:
        '200':
          description: Updated task.
        '400':
          $ref: '#/components/responses/TypedError'
        '404':
          $ref: '#/components/responses/TypedError'
    delete:
      tags: [Board]
      responses:
        '200':
          description: Deleted task.
        '404':
          $ref: '#/components/responses/TypedError'
  /api/tasks/{id}/activity:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Board]
      responses:
        '200':
          description: Task activity timeline.
        '404':
          $ref: '#/components/responses/TypedError'
  /api/agents:
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Agent rows.
    post:
      tags: [Read Models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentCreateRequest'
      responses:
        '201':
          description: Created agent.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/agents/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Agent row.
        '404':
          $ref: '#/components/responses/TypedError'
    patch:
      tags: [Read Models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentUpdateRequest'
      responses:
        '200':
          description: Updated agent.
        '400':
          $ref: '#/components/responses/TypedError'
        '404':
          $ref: '#/components/responses/TypedError'
    delete:
      tags: [Read Models]
      responses:
        '204':
          description: Deleted agent.
        '404':
          $ref: '#/components/responses/TypedError'
  /api/skills:
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Skill rows.
    post:
      tags: [Read Models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillCreateRequest'
      responses:
        '201':
          description: Created skill.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/skills/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Skill row.
        '404':
          $ref: '#/components/responses/TypedError'
    patch:
      tags: [Read Models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillUpdateRequest'
      responses:
        '200':
          description: Updated skill.
        '400':
          $ref: '#/components/responses/TypedError'
        '404':
          $ref: '#/components/responses/TypedError'
    delete:
      tags: [Read Models]
      responses:
        '204':
          description: Deleted skill.
        '404':
          $ref: '#/components/responses/TypedError'
  /api/command-history:
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Command history rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CommandHistoryRecord'
  /api/project-boards:
    get:
      tags: [Read Models]
      summary: Read project board records
      responses:
        '200':
          description: Project board rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectBoardRecord'
  /api/board-projects:
    get:
      tags: [Read Models]
      summary: Read board project records
      responses:
        '200':
          description: Board project rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BoardProjectRecord'
  /api/board-tasks:
    get:
      tags: [Read Models]
      summary: Read board task records
      responses:
        '200':
          description: Board task rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BoardTaskRecord'
  /api/polling/status:
    get:
      tags: [Polling]
      summary: Read polling health and recent operational events
      responses:
        '200':
          description: Poller status rows and recent event rows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PollingStatusResponse'
  /api/settings/models:
    get:
      tags: [Settings]
      summary: Read workflow model and reasoning settings
      responses:
        '200':
          description: Workflow model settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsModelsResponse'
        '404':
          $ref: '#/components/responses/TypedError'
    patch:
      tags: [Settings]
      summary: Update workflow model and reasoning settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsModelsUpdateRequest'
      responses:
        '200':
          description: Updated workflow model settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsModelsResponse'
        '400':
          $ref: '#/components/responses/TypedError'
        '404':
          $ref: '#/components/responses/TypedError'
  /api/settings/github:
    get:
      tags: [Settings]
      summary: Read GitHub commit and PR instructions
      responses:
        '200':
          description: GitHub workflow instructions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsGithubResponse'
        '404':
          $ref: '#/components/responses/TypedError'
    patch:
      tags: [Settings]
      summary: Update GitHub commit and PR instructions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsGithubUpdateRequest'
      responses:
        '200':
          description: Updated GitHub workflow instructions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsGithubResponse'
        '400':
          $ref: '#/components/responses/TypedError'
        '404':
          $ref: '#/components/responses/TypedError'
  /api/workspaces/{workspaceId}/projects:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
    get:
      tags: [Board]
      responses:
        '200':
          description: Workspace project list.
  /api/workspaces/{workspaceId}/projects/{projectId}/board:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Board]
      responses:
        '200':
          description: Workspace project board.
        '404':
          $ref: '#/components/responses/TypedError'
  /api/inbox/messages:
    get:
      tags: [Read Models]
      parameters:
        - in: query
          name: workspaceId
          required: true
          schema:
            type: string
            minLength: 1
        - in: query
          name: userId
          required: true
          schema:
            type: string
            minLength: 1
        - in: query
          name: runId
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Inbox messages scoped by workspace, user, and run.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InboxMessageRecord'
        '400':
          $ref: '#/components/responses/TypedError'
    post:
      tags: [Read Models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InboxMessageCreateRequest'
      responses:
        '201':
          description: Created inbox message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxMessageRecord'
        '400':
          $ref: '#/components/responses/TypedError'
  /api/notifications:
    post:
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '202':
          description: Notification accepted.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/notifications/email:
    post:
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Notification sent.
        '400':
          $ref: '#/components/responses/TypedError'
components:
  parameters:
    Id:
      in: path
      name: id
      required: true
      schema:
        type: string
        minLength: 1
    WorkspaceId:
      in: path
      name: workspaceId
      required: true
      schema:
        type: string
        minLength: 1
    ProjectId:
      in: path
      name: projectId
      required: true
      schema:
        type: string
        minLength: 1
  responses:
    TypedError:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TypedError'
  schemas:
    TypedError:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: string
    AgentCreateRequest:
      type: object
      additionalProperties: false
      required: [id, name, backend, model, createdAt]
      properties:
        id: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        backend: { type: string, minLength: 1 }
        model: { type: string, minLength: 1 }
        reasoningEffort:
          type: string
          nullable: true
          allOf:
            - $ref: '#/components/schemas/SettingsReasoningEffort'
        createdAt: { type: string, minLength: 1 }
    AgentUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/AgentPatchFields'
        - minProperties: 1
    AgentPatchFields:
      type: object
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        logo: { type: string }
        runtime: { type: string, minLength: 1 }
        backend: { type: string, minLength: 1 }
        model: { type: string, minLength: 1 }
        reasoningEffort:
          type: string
          nullable: true
          allOf:
            - $ref: '#/components/schemas/SettingsReasoningEffort'
        status:
          type: string
          enum: [offline, online]
        concurrency:
          type: integer
          minimum: 1
        owner: { type: string, minLength: 1 }
        createdAt: { type: string, minLength: 1 }
        updatedAt: { type: string, minLength: 1 }
        skills:
          type: array
          items:
            type: string
            minLength: 1
        recentWork:
          type: array
          items:
            type: string
            minLength: 1
        activity:
          type: array
          items:
            type: string
            minLength: 1
        instructions: { type: string }
    SkillCreateRequest:
      type: object
      additionalProperties: false
      required: [id, name, description, source, updatedAt]
      properties:
        id: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        description: { type: string, minLength: 1 }
        source: { type: string, minLength: 1 }
        updatedAt: { type: string, minLength: 1 }
    SkillUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/SkillPatchFields'
        - minProperties: 1
    SettingsModelsResponse:
      type: object
      additionalProperties: false
      required: [stages, availableModels, reasoningEfforts]
      properties:
        stages:
          type: array
          items:
            $ref: '#/components/schemas/SettingsModelStage'
        availableModels:
          type: array
          items:
            $ref: '#/components/schemas/SettingsModelOption'
        reasoningEfforts:
          type: array
          items:
            $ref: '#/components/schemas/SettingsReasoningEffort'
    SettingsGithubResponse:
      type: object
      additionalProperties: false
      required: [commitInstruction, prInstruction]
      properties:
        commitInstruction:
          type: string
        prInstruction:
          type: string
    SettingsModelStage:
      type: object
      additionalProperties: false
      required: [id, label]
      properties:
        id:
          type: string
          enum: [brainstorm, plan, implement, testing]
        label:
          type: string
        model:
          type: string
        reasoningEffort:
          $ref: '#/components/schemas/SettingsReasoningEffort'
    SettingsModelOption:
      type: object
      additionalProperties: false
      required: [id, label, description]
      properties:
        id:
          type: string
        label:
          type: string
        description:
          type: string
        defaultFor:
          type: array
          items:
            type: string
    SettingsModelsUpdateRequest:
      type: object
      additionalProperties: false
      required: [stages]
      properties:
        stages:
          type: array
          items:
            $ref: '#/components/schemas/SettingsModelStageUpdate'
    SettingsGithubUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        commitInstruction:
          type: string
        prInstruction:
          type: string
    SettingsModelStageUpdate:
      type: object
      additionalProperties: false
      required: [id]
      properties:
        id:
          type: string
          enum: [brainstorm, plan, implement, testing]
        model:
          type: string
          nullable: true
        reasoningEffort:
          type: string
          nullable: true
          allOf:
            - $ref: '#/components/schemas/SettingsReasoningEffort'
    SettingsReasoningEffort:
      type: string
      enum: [low, medium, high, xhigh]
    SkillPatchFields:
      type: object
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string, minLength: 1 }
        source: { type: string, minLength: 1 }
        updatedAt: { type: string, minLength: 1 }
    GitHubConnectionResponse:
      type: object
      additionalProperties: false
      required: [isConfigured, isConnected, login, unavailableReason]
      properties:
        isConfigured: { type: boolean }
        isConnected: { type: boolean }
        login:
          type: string
          nullable: true
        unavailableReason:
          type: string
          nullable: true
    GitHubDeviceStartRequest:
      type: object
      additionalProperties: false
      properties:
        clientId:
          type: string
          nullable: true
          minLength: 1
    GitHubDeviceStartResponse:
      type: object
      additionalProperties: false
      required: [userCode, verificationUri, expiresIn, interval]
      properties:
        userCode: { type: string, minLength: 1 }
        verificationUri: { type: string, minLength: 1 }
        expiresIn: { type: integer, minimum: 1 }
        interval: { type: integer, minimum: 1 }
    GitHubDevicePollResponse:
      type: object
      additionalProperties: false
      required: [status, interval, connection, message]
      properties:
        status:
          type: string
